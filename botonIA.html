<button id="btnAbrirModalIA"
    style="background: var(--color-primario); color: white; border: none; border-radius: 50%; cursor: pointer; box-shadow: none; font-size: 16px; padding: 8px; width: 40px; height: 40px; position: fixed; bottom: 10px; right: 10px; z-index: 1000;">
    <i class="fa-solid fa-envelope-open-text"></i>
</button>

<div id="ModalIA" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 650px; width: 90%;">
        <span class="close" onclick="cerrarModalIA()">&times;</span>
        <h2>Analizador de correos</h2>
        <div class="container-ia" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="text-input-section" style="display: flex; flex-direction: column; gap: 5px;">
                <label for="textoOriginal" style="width: 100%; text-align: left;">Pega aquí toda la conversación del correo:</label>
                <textarea id="textoOriginal" rows="8" placeholder="Pega la conversación completa del correo electrónico..."
                    style="width: 100%; resize: vertical;"></textarea>
            </div>
            <div id="loadingIA" style="display: none; text-align: center; padding: 10px;">
                <p style="margin: 0;">Analizando correo...</p>
            </div>
            <div id="resultadoIA" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <div class="output-actions" id="outputActions" style="display: none; gap: 10px;">
                <button onclick="copiarTextoIA()" style="flex: 1; padding: 10px;">Copiar análisis</button>
            </div>
        </div>
    </div>
</div>
